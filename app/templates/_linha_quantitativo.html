<tr id="item-{{ item.id }}">
  <td>{{ item.codigo }}</td>
  <td>{{ item.descricao }}</td>
  <td>{{ item.unidade or "—" }}</td>
  <td>
    <form hx-post="/projetos/{{ projeto.id }}/quantitativos"
          hx-target="#item-{{ item.id }}" hx-swap="outerHTML">
      <input type="hidden" name="eap_item_id" value="{{ item.id }}">
      {# quantidade_ptbr: vírgula decimal, inteiro sem casa morta, 0 visível (nunca `or ''`) #}
      <input name="quantidade" value="{{ item.quantidade_ptbr }}" inputmode="decimal">
      <select name="origem" title="MANUAL: estimado à mão · TAKEOFF: medido de projeto executivo (D2)">
        <option value="MANUAL" {{ "selected" if item.origem != "TAKEOFF" }}>MANUAL</option>
        <option value="TAKEOFF" {{ "selected" if item.origem == "TAKEOFF" }}>TAKEOFF</option>
      </select>
      <button type="submit">Salvar</button>
    </form>
  </td>
  <td>{{ item.origem or "—" }}</td>
</tr>
